name: Reto 1-A - Automatización E2E con Arquitectura Asíncrona (Kafka + Docker)

on:
  push:
    branches: [ main ]

jobs:
  run-automation-suite:
    name: Ejecucion de Pruebas y Reporte
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Codigo del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Levantar Infraestructura de Kafka (Docker)
        run: |
          docker compose up -d
          echo "Esperando que Kafka-Broker este completamente inicializado..."
          sleep 15

      - name: 4. Instalar Dependencias Backend
        run: |
          cd backend
          npm ci

      - name: 5. Instalar Dependencias Frontend
        run: |
          cd frontend
          npm ci

      - name: 6. Instalar Dependencias de Pruebas (Playwright)
        run: |
          cd tests
          npm ci
          npm install --save-dev wait-on @playwright/test
          node ./node_modules/playwright/cli.js install --with-deps

      - name: 7. Lanzar Backend y Worker en Segundo Plano
        run: |
          cd backend
          # nohup node server.js > ../backend.log 2>&1 &
          # nohup node worker.js > ../worker.log 2>&1 &
          node server.js & #prueba
          node worker.js & #prueba

      - name: 8. Esperar Backend listo
        run: |
          cd tests
          npx wait-on tcp:127.0.0.1:3000 --timeout 120000

      - name: 9. Ejecutar Script de prueba en modo Headless
        run: |
          cd tests
          node ./node_modules/playwright/cli.js test ./registro-async.spec.js --repeat-each=3 --workers=1

      - name: 10. Subir reporte Playwright
        if: always() #failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/