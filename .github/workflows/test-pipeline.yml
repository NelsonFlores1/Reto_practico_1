name: Lite Thinking QA TestOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-automation-suite:
    name: Ejecucion de Pruebas y Reporte
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Codigo del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Levantar Infraestructura de Kafka (Docker)
        run: |
          docker compose up -d
          echo "Esperando que Kafka-Broker este completamente inicializado..."
          sleep 15

      - name: 4. Instalar Dependencias Backend
        run: |
          cd backend
          npm ci

      - name: 5. Instalar Dependencias Frontend
        run: |
          cd frontend
          npm ci

      - name: 6. Instalar Dependencias de Pruebas (Playwright)
        run: |
          cd tests
          npm ci
          npm install --save-dev wait-on @playwright/test
          node ./node_modules/playwright/cli.js install --with-deps

      - name: 7. Lanzar Backend y Worker en Segundo Plano
        run: |
          cd backend
          nohup node server.js > ../backend.log 2>&1 &
          nohup node worker.js > ../worker.log 2>&1 &

      - name: 8. Esperar Backend listo
        run: |
          cd tests
          npx wait-on tcp:127.0.0.1:3000 --timeout 120000

      # - name: 9. Lanzar Frontend en Segundo Plano
      #   run: |
      #     cd frontend
      #     nohup npm run dev -- --host 0.0.0.0 --port 5173 > ../frontend.log 2>&1 &
      #     sleep 5
      #     ps -ef | grep -E "vite|node" || true
      #     cat ../frontend.log || true

      # - name: 10. Esperar Frontend listo
      #   run: |
      #     cd tests
      #     npx wait-on tcp:127.0.0.1:5173 --timeout 120000

      - name: 11. Ejecutar Script de prueba en modo Headless
        run: |
          cd tests
          node ./node_modules/playwright/cli.js test ./registro-async.spec.js